services:
  - type: web
    name: one-ten-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server_sqlite.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
